services:
  workflow-os-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: workflow-os-mcp:local
    container_name: workflow-os-mcp
    ports:
      - "${MCP_PORT:-3000}:${MCP_PORT:-3000}"
    environment:
      MCP_TRANSPORT: http
      MCP_PORT: "${MCP_PORT:-3000}"
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${MCP_PORT:-3000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
